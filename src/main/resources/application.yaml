spring:
  application:
    name: api
  datasource:
    url: jdbc:postgresql://${DB_HOST:139.162.165.30}:${DB_PORT:15432}/${DB_NAME:mpira}?socketTimeout=30&connectTimeout=10&tcpKeepAlive=true
    username: ${DB_USERNAME:mpira}
    password: ${DB_PASSWORD:mpira2026}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 300000        # 5 min — retire idle connections before the network kills them
      keepalive-time: 60000       # ping the DB every 60s to keep connections alive
      max-lifetime: 600000        # recycle connections after 10 min regardless
      validation-timeout: 5000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  liquibase:
    change-log: classpath:db/changelog/master.xml
    enabled: true